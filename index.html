<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="班表查詢">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4F46E5">
    
    <link rel="manifest" href="manifest.json">

    <title>班表查詢與工作提醒系統 蔡宏和製作20260308</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
   
        :root {
            --primary: #4F46E5;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --morn-color: #FEF3C7;
            --morn-text: #D97706;
            --mid-color: #DBEAFE;
            --mid-text: #2563EB;
            --night-color: #F3E8FF;
            --night-text: #9333EA;
            --rest-color: #F3F4F6;
            --rest-text: #4B5563;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }

        h1 {
            text-align: center; font-size: 1.8rem; margin-bottom: 20px;
            color: var(--primary); line-height: 1.4;
        }

        .card {
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: slideInUp 0.4s ease-out forwards;
        }

        .card-title {
            font-size: 1.1rem; font-weight: bold; margin-top: 0; margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color); padding-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .date-picker-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }

        input[type="date"], select, input[type="text"], input[type="number"] {
            padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;
            font-size: 1rem; width: 100%; box-sizing: border-box; margin-bottom: 10px;
        }

        input[type="date"] { margin-bottom: 0; flex-grow: 1; text-align: center; }
        
        .toggle-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }

        .btn-mode {
            flex: 1; padding: 10px 0; border: 1px solid var(--primary); border-radius: 8px;
            background: transparent; color: var(--primary); font-weight: bold; font-size: 1rem;
            cursor: pointer; text-align: center; transition: all 0.2s;
        }

        .btn-mode.active { background: var(--primary); color: white; }

        .shift-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.95rem; }

        .shift-morn { background: var(--morn-color); color: var(--morn-text); }
        .shift-mid { background: var(--mid-color); color: var(--mid-text); }
        .shift-night { background: var(--night-color); color: var(--night-text); }
        .shift-rest { background: var(--rest-color); color: var(--rest-text); }

        .team-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .team-row:last-child { border-bottom: none; }
        .team-name { font-size: 1.05rem; }

        .task-list { list-style-type: none; padding: 0; margin: 0; }
        .task-list li {
            background: #FEF2F2; color: #DC2626; padding: 12px; border-radius: 8px;
            margin-bottom: 10px; font-size: 0.95rem; border-left: 4px solid #EF4444;
            animation: slideInUp 0.35s ease-out forwards;
        }
        .task-list li.no-task { background: #ECFCCB; color: #4D7C0F; border-left: 4px solid #84CC16; }

        .btn {
            background: var(--primary); color: white; border: none; padding: 10px 15px;
            border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%;
            font-weight: bold; text-align: center;
        }

        .btn-icon { width: auto; flex-grow: 0; padding: 10px 15px; font-size: 1.2rem; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); margin-top: 10px; }
        .btn-danger { background: transparent; color: #DC2626; border: 1px solid #DC2626; margin-top: 10px; }

        .btn:active, .btn-icon:active, .btn-mode:active { transform: scale(0.95); transition: transform 0.1s; }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
